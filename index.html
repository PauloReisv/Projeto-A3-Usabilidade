<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Essência</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts: Playfair Display + Lato -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <!-- Nosso CSS personalizado -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-none d-sm-block" href="#">Essenza</a>
        
        <div class="ms-auto">
          <ul class="navbar-nav d-flex flex-row gap-4">
            <li class="nav-item">
              <a class="nav-link active" href="#" id="navTodos" title="Todos os Produtos">
                <i class="bi bi-grid fs-5"></i>
                <span class="d-none d-md-inline ms-2">Todos</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" id="navFavoritos" title="Favoritos">
                <i class="bi bi-star fs-5"></i>
                <span class="d-none d-md-inline ms-2">Favoritos</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" id="navCarrinho" title="Carrinho de Compras">
                <i class="bi bi-cart fs-5"></i>
                <span class="d-none d-md-inline ms-2">Carrinho</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

<main class="container my-5">
    <div class="row justify-content-center mb-3">
      <div class="col-md-6 col-lg-4">
        <input type="text" id="campoBusca" class="form-control search-input" placeholder="Buscar produto...">
      </div>
    </div>

    <div class="row justify-content-center mb-5 gap-2">
      <div class="col-md-4 col-lg-3">
        <select id="filtroCategoria" class="form-select custom-select">
          <option value="">Todas as Categorias</option>
        </select>
      </div>
      <div class="col-md-4 col-lg-3">
        <select id="ordenacaoPreco" class="form-select custom-select">
          <option value="">Ordenar por Preço (Padrão)</option>
          <option value="asc">Menor Preço</option>
          <option value="desc">Maior Preço</option>
        </select>
      </div>
    </div>

    <div id="containerProdutos" class="row g-4"></div>

    <nav aria-label="Navegação de páginas" class="mt-5 text-center">
      <ul class="pagination justify-content-center" id="paginacaoContainer"></ul>
    </nav>

    <div id="mensagemVazia" class="text-center mt-5 mensagem-vazia" style="display: none;">
      <h4>Nenhum produto encontrado</h4>
      <p>Tente outro termo ou limpe os filtros.</p>
    </div>
  </main>
  
<div class="modal fade" id="modalDetalhes" tabindex="-1" aria-hidden="true" style="display: none;">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="background-color: var(--creme); border: 2px solid var(--dourado); border-radius: 12px;">
        <div class="modal-header" style="border-bottom: 1px solid var(--bege);">
          <h5 class="modal-title" id="modalDetalhesTitulo" style="font-family: var(--fonte-titulo); color: var(--marrom); font-weight: 600;"></h5>
          <button type="button" class="btn-close" id="btnFecharModal" style="cursor: pointer;"></button>
        </div>
        <div class="modal-body" id="modalDetalhesCorpo" style="font-family: var(--fonte-corpo);">
          </div>
      </div>
    </div>
  </div>
  <div class="modal-backdrop fade" id="modalBackdrop" style="display: none; pointer-events: none;"></div>

  <script src="js/app.js" type="module"></script>
</body>
</html>
