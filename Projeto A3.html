<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Essência</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts: Playfair Display + Lato -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <!-- Nosso CSS personalizado -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="#">🌿 Essência</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation"
                style="border-color: var(--dourado);">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link active" href="#" id="navTodos">Todos</a></li>
            <li class="nav-item"><a class="nav-link" href="#" id="navFavoritos">🌙 Favoritos</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container my-5">
    <div class="row justify-content-center mb-5">
      <div class="col-md-6 col-lg-4">
        <input type="text" id="campoBusca" class="form-control search-input" placeholder="Buscar produto...">
      </div>
    </div>

    <div id="containerProdutos" class="row g-4"></div>

    <div id="mensagemVazia" class="text-center mt-5 mensagem-vazia" style="display: none;">
      <h4>🌸 Nenhum produto encontrado</h4>
      <p>Tente outro termo ou favorite alguns itens.</p>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
