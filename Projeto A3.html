<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Produtos</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    /* Pequenos ajustes para os cards */
    .card-img-top {
      object-fit: cover;
    }
    .card {
      border: none; /* A borda já está na coluna, para ficar igual ao template */
    }
    .fav-icon {
      cursor: pointer;
      font-size: 1.5rem;
    }
    .fav-icon.bi-heart-fill {
      color: #dc3545; /* vermelho quando favorito */
    }
  </style>
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">📦 Catálogo de Produtos</a>
        <div class="navbar-nav">
          <a class="nav-link active" href="#" id="navTodos">Todos</a>
          <a class="nav-link" href="#" id="navFavoritos">⭐ Favoritos</a>
        </div>
      </div>
    </nav>
  </header>

  <main class="container my-4">
    <div class="row mb-4">
      <div class="col-md-6">
        <input type="text" id="campoBusca" class="form-control" placeholder="Buscar por nome do produto...">
      </div>
    </div>

    <div id="containerProdutos" class="row g-4"></div>

    <div id="mensagemVazia" class="text-center mt-5" style="display: none;">
      <h4>Nenhum produto encontrado</h4>
      <p>Tente ajustar sua busca ou favoritar alguns produtos.</p>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
